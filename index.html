<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LED Music - Free Edition</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
  <style>
    :root {
      font-size: 16px; --bg-color-1: #0f172a; --bg-color-2: #3b0764; --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1); --text-main: #f8fafc; --text-muted: #94a3b8;
      --accent: #a855f7; --accent-hover: #c084fc; --danger: #ef4444; --favorite: #fbbf24;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; color: var(--text-main); background: linear-gradient(135deg, var(--bg-color-1), var(--bg-color-2)); background-size: 400% 400%; animation: gradientBG 15s ease infinite; min-height: 100vh; overflow-x: hidden; }
    @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .app-container { display: grid; grid-template-rows: 1fr auto; height: 100vh; width: 100vw; }
    .sidebar { overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
    .player-section { background: var(--glass-bg); backdrop-filter: blur(12px); border-top: 1px solid var(--glass-border); padding: 1rem 1.25rem; position: sticky; bottom: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; }
    @media (min-width: 768px) { .app-container { grid-template-columns: minmax(320px, 35vw) 1fr; grid-template-rows: 100vh; } .sidebar { border-right: 1px solid var(--glass-border); height: 100vh; } .player-section { border-top: none; justify-content: center; padding: 2.5rem; } }
    .glass-panel { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 1rem; padding: 1rem; }
    input, button { font-family: inherit; outline: none; border: none; min-height: 2.75rem; border-radius: 0.625rem; font-size: 1rem; }
    input[type="text"], input[type="password"] { width: 100%; background: rgba(0, 0, 0, 0.2); color: var(--text-main); padding: 0 1rem; border: 1px solid var(--glass-border); margin-bottom: 0.625rem; }
    button { background: var(--glass-bg); color: var(--text-main); cursor: pointer; transition: all 0.2s ease; padding: 0 1.25rem; border: 1px solid var(--glass-border); display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; }
    button:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }
    button.primary { background: var(--accent); border: none; }
    button.primary:hover { background: var(--accent-hover); }
    .top-controls { display: grid; grid-template-columns: 1fr auto; gap: 0.625rem; margin-bottom: 1rem; }
    .top-controls input { grid-column: span 2; margin-bottom: 0; }
    .top-controls .actions { grid-column: span 2; display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .top-controls .actions button { flex: 1; }
    .track-list { display: flex; flex-direction: column; gap: 0.625rem; }
    .track-card { display: flex; align-items: center; gap: 1rem; cursor: pointer; transition: all 0.3s ease; }
    .track-card:hover { background: rgba(255, 255, 255, 0.1); }
    .track-card.active { border-color: var(--accent); background: rgba(168, 85, 247, 0.1); }
    .track-card img { width: 3rem; height: 3rem; border-radius: 0.5rem; object-fit: cover; }
    .track-info { flex: 1; overflow: hidden; }
    .track-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-artist { font-size: 0.85rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cover-large { width: 100%; max-width: clamp(200px, 30vw, 400px); aspect-ratio: 1; border-radius: 1.25rem; object-fit: cover; box-shadow: 0 20px 40px rgba(0,0,0,0.4); margin-bottom: 2rem; display: none; }
    @media (min-width: 768px) { .cover-large { display: block; } }
    .player-controls { width: 100%; max-width: 500px; text-align: center; }
    .progress-container { width: 100%; height: 0.5rem; background: rgba(255,255,255,0.1); border-radius: 0.25rem; cursor: pointer; margin: 1rem 0; position: relative; }
    .progress-bar { height: 100%; background: var(--accent); border-radius: 0.25rem; width: 0%; }
    .time-info { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-muted); }
    .control-buttons { display: flex; justify-content: center; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    .control-buttons button { width: 3rem; height: 3rem; border-radius: 50%; padding: 0; font-size: 1.2rem; }
    .control-buttons button.play-pause { width: 4rem; height: 4rem; font-size: 1.5rem; background: var(--accent); border: none; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 100; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s ease; padding: 1rem; }
    .modal.show { display: flex; opacity: 1; }
    .modal-content { width: 100%; max-width: 28rem; }
  </style>
</head>
<body>

<div class="app-container">
  <div class="sidebar">
    <div class="top-controls">
      <input type="text" id="searchInput" placeholder="Поиск треков...">
      <div class="actions">
        <button id="btnMyWave">🌊 Моя волна</button>
        <button id="btnAddModal" style="display: none;">+ Добавить</button>
        <button id="btnProfile">⚙️ Настройки</button>
      </div>
    </div>
    <div class="track-list" id="trackList">
      <div style="text-align: center; color: var(--text-muted); padding: 2rem;">Загрузка треков...</div>
    </div>
  </div>

  <div class="player-section">
    <img id="coverLarge" class="cover-large" src="https://via.placeholder.com/400" alt="Cover">
    <div class="player-controls">
      <div style="margin-bottom: 1.25rem;">
        <h2 id="currentTitle">Трек не выбран</h2>
        <p id="currentArtist" style="color: var(--text-muted);">Автор</p>
      </div>
      <div class="progress-container" id="progressContainer"><div class="progress-bar" id="progressBar"></div></div>
      <div class="time-info"><span id="currentTime">0:00</span><span id="duration">0:00</span></div>
      <div class="control-buttons">
        <button id="btnPrev">⏮</button>
        <button id="btnPlay" class="play-pause">▶</button>
        <button id="btnNext">⏭</button>
      </div>
    </div>
  </div>
</div>

<div class="modal" id="modalProfile">
  <div class="glass-panel modal-content" style="text-align: center;">
    <h2>Настройки доступа</h2>
    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem; margin-top: 0.5rem;">
      Обычным слушателям ничего вводить не нужно. Если вы создатель (md-dog77), введите токен для загрузки треков.
    </p>
    <input type="password" id="inputAdminToken" placeholder="GitHub Token (ghp_...)">
    <button id="btnSaveAdmin" class="primary" style="width: 100%; margin-bottom: 0.5rem;">Сохранить токен</button>
    <button class="close-modal" style="width: 100%;">Закрыть</button>
  </div>
</div>

<div class="modal" id="modalAddTrack">
  <div class="glass-panel modal-content">
    <h3 style="margin-bottom: 1rem;">Загрузить трек</h3>
    <input type="file" id="inputFile" accept="audio/mp3, audio/*" style="margin-bottom: 1rem; width: 100%;">
    <input type="text" id="inputGenre" placeholder="Жанр (обязательно)" required>
    <div id="addTrackStatus" style="color: var(--accent); margin-bottom: 1rem; font-weight: bold; text-align: center;"></div>
    <div style="display: flex; gap: 0.5rem;">
      <button id="btnSaveTrack" class="primary" style="flex: 1;">Опубликовать</button>
      <button class="close-modal" style="flex: 1;">Отмена</button>
    </div>
  </div>
</div>

<script>
  // Конфигурация приложения
  const APP_CONFIG = {
    gistId: '8fd54ada74ef446aca9a82b4aa4aaac4', // Твой публичный Gist ID (безопасно)
    githubRepo: 'md-dog77/Led_Player',       // Твой репозиторий (безопасно)
    getToken: () => localStorage.getItem('led_admin_token') || '' // Токен берется из браузера
  };

  const state = {
    allTracks: [], playlist: [], currentIndex: -1,
    audio: new Audio(), isPlaying: false, isMyWave: false
  };

  const defaultCover = 'https://via.placeholder.com/400/1e293b/a855f7?text=Music';

  // Проверка прав администратора при загрузке
  function checkAdminRights() {
    if (APP_CONFIG.getToken()) {
      document.getElementById('btnAddModal').style.display = 'inline-flex';
    } else {
      document.getElementById('btnAddModal').style.display = 'none';
    }
  }

  // --- Публичная загрузка треков (без токена) ---
  async function loadTracks() {
    try {
      // Запрашиваем Gist публично. Добавляем timestamp, чтобы избежать кэша.
      const response = await fetch(`https://api.github.com/gists/${APP_CONFIG.gistId}?t=${Date.now()}`);
      if (!response.ok) throw new Error('Ошибка сети');
      
      const data = await response.json();
      const content = data.files['songs.json'].content;
      state.allTracks = JSON.parse(content || '[]');
      
      state.playlist = [...state.allTracks];
      renderTrackList();
    } catch (err) {
      console.error('Ошибка загрузки Gist:', err);
      document.getElementById('trackList').innerHTML = '<div style="text-align:center; color:#ef4444; padding:2rem;">Не удалось загрузить музыку. Проверьте интернет.</div>';
    }
  }

  // --- Функции плеера (Отрисовка, Воспроизведение) ---
  function renderTrackList() {
    const list = document.getElementById('trackList');
    list.innerHTML = '';
    if(state.playlist.length === 0) {
        list.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: 2rem;">Треков пока нет</div>';
        return;
    }

    state.playlist.forEach((track, index) => {
      const el = document.createElement('div');
      el.className = `glass-panel track-card ${state.currentIndex === index ? 'active' : ''}`;
      el.innerHTML = `
        <img src="${track.cover || defaultCover}" alt="cover">
        <div class="track-info">
          <div class="track-title">${track.title}</div>
          <div class="track-artist">${track.artist} &bull; ${track.genre || 'Неизвестно'}</div>
        </div>
      `;
      el.onclick = () => playTrack(index);
      list.appendChild(el);
    });
  }

  function playTrack(index) {
    if (index < 0 || index >= state.playlist.length) return;
    if (state.currentIndex !== index) {
      state.currentIndex = index;
      state.audio.src = state.playlist[index].audio;
    }
    state.audio.play().then(() => { state.isPlaying = true; updatePlayerUI(); });
  }

  function updatePlayerUI() {
    if (state.currentIndex < 0) return;
    const t = state.playlist[state.currentIndex];
    document.getElementById('currentTitle').textContent = t.title;
    document.getElementById('currentArtist').textContent = t.artist;
    document.getElementById('coverLarge').src = t.cover || defaultCover;
    document.getElementById('btnPlay').textContent = state.isPlaying ? '⏸' : '▶';
    renderTrackList();
  }

  document.getElementById('btnPlay').onclick = () => {
    if (state.currentIndex === -1 && state.playlist.length > 0) playTrack(0);
    else if (state.isPlaying) { state.audio.pause(); state.isPlaying = false; updatePlayerUI(); }
    else playTrack(state.currentIndex);
  };
  
  document.getElementById('btnNext').onclick = () => playTrack(state.currentIndex < state.playlist.length - 1 ? state.currentIndex + 1 : 0);
  document.getElementById('btnPrev').onclick = () => playTrack(state.currentIndex > 0 ? state.currentIndex - 1 : state.playlist.length - 1);
  state.audio.addEventListener('ended', () => document.getElementById('btnNext').click());

  state.audio.addEventListener('timeupdate', () => {
    const p = (state.audio.currentTime / state.audio.duration) * 100;
    document.getElementById('progressBar').style.width = `${p || 0}%`;
    document.getElementById('currentTime').textContent = formatTime(state.audio.currentTime);
    document.getElementById('duration').textContent = formatTime(state.audio.duration);
  });

  document.getElementById('progressContainer').onclick = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    state.audio.currentTime = ((e.clientX - rect.left) / rect.width) * state.audio.duration;
  };

  function formatTime(sec) {
    if (!sec || isNaN(sec)) return "0:00";
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return `${m}:${s < 10 ? '0' : ''}${s}`;
  }

  // --- Поиск и Моя Волна ---
  document.getElementById('searchInput').oninput = (e) => {
    const q = e.target.value.toLowerCase();
    state.playlist = state.allTracks.filter(t => t.title.toLowerCase().includes(q) || t.artist.toLowerCase().includes(q));
    renderTrackList();
  };

  document.getElementById('btnMyWave').onclick = (e) => {
    state.isMyWave = !state.isMyWave;
    e.target.classList.toggle('active', state.isMyWave);
    state.playlist = state.isMyWave ? [...state.allTracks].sort(() => Math.random() - 0.5) : [...state.allTracks];
    state.currentIndex = -1;
    renderTrackList();
    if(state.playlist.length > 0) playTrack(0);
  };

  // --- Настройки (Сохранение токена админа) ---
  document.getElementById('btnProfile').onclick = () => {
    document.getElementById('inputAdminToken').value = APP_CONFIG.getToken();
    document.getElementById('modalProfile').classList.add('show');
  };

  document.getElementById('btnSaveAdmin').onclick = () => {
    const token = document.getElementById('inputAdminToken').value.trim();
    localStorage.setItem('led_admin_token', token);
    checkAdminRights();
    document.getElementById('modalProfile').classList.remove('show');
    alert('Токен сохранен! Теперь вы можете загружать музыку.');
  };

  // --- Загрузка музыки (Требует токен) ---
  document.getElementById('btnAddModal').onclick = () => document.getElementById('modalAddTrack').classList.add('show');
  
  document.getElementById('btnSaveTrack').onclick = async () => {
    const file = document.getElementById('inputFile').files[0];
    const genre = document.getElementById('inputGenre').value.trim();
    const status = document.getElementById('addTrackStatus');
    const token = APP_CONFIG.getToken();

    if (!file || !genre) { status.textContent = 'Выберите файл и укажите жанр'; return; }
    if (!token) { status.textContent = 'Отсутствует токен доступа (зайдите в Настройки)'; return; }

    try {
      status.textContent = '⏳ Чтение тегов...';
      const newTrack = {
        id: Date.now(), title: file.name.replace(/\.[^/.]+$/, ""),
        artist: 'Неизвестен', genre: genre, cover: defaultCover, audio: ''
      };

      await new Promise((resolve) => {
        jsmediatags.read(file, {
          onSuccess: (tag) => {
            if (tag.tags.title) newTrack.title = tag.tags.title;
            if (tag.tags.artist) newTrack.artist = tag.tags.artist;
            if (tag.tags.picture) {
              const data = tag.tags.picture.data;
              let base64String = "";
              for (let i = 0; i < data.length; i++) base64String += String.fromCharCode(data[i]);
              newTrack.cover = `data:${tag.tags.picture.format};base64,${window.btoa(base64String)}`;
            }
            resolve();
          },
          onError: () => resolve()
        });
      });

      // 1. Загрузка mp3 в репозиторий GitHub
      status.textContent = '🚀 Отправка mp3 на GitHub...';
      const cleanName = `${Date.now()}_track.mp3`;
      const base64Content = await new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.readAsDataURL(file);
      });

      const repoRes = await fetch(`https://api.github.com/repos/${APP_CONFIG.githubRepo}/contents/music/${cleanName}`, {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: `Add track: ${newTrack.title}`, content: base64Content })
      });
      
      if (!repoRes.ok) throw new Error('Ошибка загрузки mp3. Проверьте права токена.');
      const repoData = await repoRes.json();
      newTrack.audio = repoData.content.download_url;

      // 2. Обновление Gist
      status.textContent = '✍️ Обновление базы данных (Gist)...';
      state.allTracks.push(newTrack);
      
      const gistRes = await fetch(`https://api.github.com/gists/${APP_CONFIG.gistId}`, {
        method: 'PATCH',
        headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json' },
        body: JSON.stringify({ files: { 'songs.json': { content: JSON.stringify(state.allTracks, null, 2) } } })
      });

      if (!gistRes.ok) throw new Error('Ошибка обновления Gist. Проверьте права токена.');

      status.style.color = '#10b981';
      status.textContent = '✅ Опубликовано! Перезагрузка...';
      setTimeout(() => window.location.reload(), 1500);

    } catch (err) {
      status.style.color = 'var(--danger)';
      status.textContent = '❌ Ошибка: ' + err.message;
      console.error(err);
    }
  };

  document.querySelectorAll('.close-modal').forEach(btn => btn.onclick = (e) => e.target.closest('.modal').classList.remove('show'));

  // Инициализация
  checkAdminRights();
  loadTracks();
</script>
</body>
</html>
