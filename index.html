<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LED Music</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
  <style>
    :root {
      --bg-color-1: #0f172a;
      --bg-color-2: #3b0764;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #a855f7;
      --accent-hover: #c084fc;
      --danger: #ef4444;
      --ai-badge: #3b82f6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--text-main);
      background: linear-gradient(135deg, var(--bg-color-1), var(--bg-color-2));
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 1s ease;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .sidebar {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .player-section {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--glass-border);
      padding: 15px 20px;
      position: sticky;
      bottom: 0;
      z-index: 10;
    }

    @media (min-width: 600px) {
      .app-container { flex-direction: row; }
      .sidebar { width: 40%; max-width: 400px; border-right: 1px solid var(--glass-border); flex: none; height: 100vh; }
      .player-section { flex: 1; border-top: none; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; }
    }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 15px;
    }

    input, button {
      font-family: inherit;
      outline: none;
      border: none;
      min-height: 44px;
      border-radius: 10px;
    }

    input[type="text"], input[type="url"], input[type="password"] {
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      color: var(--text-main);
      padding: 0 15px;
      border: 1px solid var(--glass-border);
      margin-bottom: 10px;
    }

    button {
      background: var(--glass-bg);
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.2s ease;
      padding: 0 20px;
      border: 1px solid var(--glass-border);
    }
    button:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }
    button.primary { background: var(--accent); border: none; }
    button.primary:hover { background: var(--accent-hover); }
    button.active { border-color: var(--accent); color: var(--accent); }

    .top-controls { display: flex; gap: 10px; flex-wrap: wrap; }
    .top-controls button { flex: 1; min-width: max-content; }

    .track-list { display: flex; flex-direction: column; gap: 10px; }
    .track-card {
      display: flex;
      align-items: center;
      gap: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .track-card:hover { background: rgba(255, 255, 255, 0.1); }
    .track-card.active { border-color: var(--accent); background: rgba(168, 85, 247, 0.1); }
    .track-card img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
    .track-info { flex: 1; overflow: hidden; }
    .track-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-artist { font-size: 0.85em; color: var(--text-muted); }
    
    .badges { display: flex; gap: 5px; margin-top: 4px; }
    .badge { font-size: 0.7em; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
    .badge.explicit { background: rgba(239, 68, 68, 0.2); color: var(--danger); border: 1px solid var(--danger); }
    .badge.ai { background: rgba(59, 130, 246, 0.2); color: var(--ai-badge); border: 1px solid var(--ai-badge); }

    .cover-large {
      width: 100%;
      max-width: 350px;
      aspect-ratio: 1;
      border-radius: 20px;
      object-fit: cover;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      margin-bottom: 30px;
      display: none;
    }
    @media (min-width: 600px) { .cover-large { display: block; } }

    .player-controls { width: 100%; max-width: 500px; text-align: center; }
    .player-track-info { margin-bottom: 20px; }
    
    .progress-container {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      cursor: pointer;
      margin: 15px 0;
      position: relative;
    }
    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      width: 0%;
      transition: width 0.1s linear, background 0.3s ease;
    }
    .time-info { display: flex; justify-content: space-between; font-size: 0.8em; color: var(--text-muted); }

    .control-buttons { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 15px; }
    .control-buttons button { width: 50px; height: 50px; border-radius: 50%; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.2em; }
    .control-buttons button.play-pause { width: 64px; height: 64px; font-size: 1.5em; background: var(--accent); border: none; }

    .extra-controls { display: flex; align-items: center; justify-content: center; gap: 15px; flex-wrap: wrap; }
    .speed-btn { font-size: 0.9em; font-weight: bold; width: auto; padding: 0 15px; }
    input[type="range"].volume {
      -webkit-appearance: none; width: 100px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px;
    }
    input[type="range"].volume::-webkit-slider-thumb {
      -webkit-appearance: none; width: 16px; height: 16px; background: #fff; border-radius: 50%; cursor: pointer;
    }

    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 100;
      justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s ease;
    }
    .modal.show { display: flex; opacity: 1; }
    .modal-content { width: 90%; max-width: 400px; }
  </style>
</head>
<body>

<div class="app-container">
  <div class="sidebar">
    <div class="top-controls">
      <input type="text" id="searchInput" placeholder="Поиск треков...">
      <button id="btnMyWave">🌊 Моя волна</button>
      <button id="btnAddModal">+ Добавить трек</button>
      <button id="btnSettings">⚙️</button>
    </div>
    <div class="track-list" id="trackList"></div>
  </div>

  <div class="player-section">
    <img id="coverLarge" class="cover-large" src="https://via.placeholder.com/350" alt="Cover">
    <div class="player-controls">
      <div class="player-track-info">
        <h2 id="currentTitle" class="track-title">Трек не выбран</h2>
        <p id="currentArtist" class="track-artist">Автор</p>
      </div>
      <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="time-info">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
      </div>
      <div class="control-buttons">
        <button id="btnPrev">⏮</button>
        <button id="btnPlay" class="play-pause">▶</button>
        <button id="btnNext">⏭</button>
      </div>
      <div class="extra-controls">
        <button id="btnSpeed" class="speed-btn">1x</button>
        <span>🔈</span>
        <input type="range" id="volumeControl" class="volume" min="0" max="1" step="0.05" value="1">
      </div>
    </div>
  </div>
</div>

<div class="modal" id="modalSettings">
  <div class="glass-panel modal-content">
    <h3>Настройки интеграции</h3>
    <p style="font-size: 0.8em; color: var(--text-muted); margin-bottom: 10px;">Для облачного сохранения настройте поля ниже:</p>
    <input type="password" id="inputGithubToken" placeholder="GitHub Personal Access Token (PAT)">
    <input type="text" id="inputGistId" placeholder="GitHub Gist ID (для songs.json)">
    <input type="text" id="inputGithubRepo" placeholder="Репозиторий для MP3 (например: Юзернейм/название-репо)">
    <div style="display: flex; gap: 10px; margin-top: 15px;">
      <button id="btnSaveSettings" class="primary">Сохранить</button>
      <button class="close-modal">Отмена</button>
    </div>
  </div>
</div>

<div class="modal" id="modalAddTrack">
  <div class="glass-panel modal-content">
    <h3>Загрузить трек напрямую</h3>
    <p style="font-size: 0.8em; color: var(--text-muted); margin-bottom: 15px;">Выберите .mp3 файл. Плеер автоматически загрузит его в ваш GitHub и считает теги.</p>
    
    <input type="file" id="inputFile" accept="audio/mp3, audio/*" style="padding-top: 8px; background: rgba(0,0,0,0.2); margin-bottom: 15px; width: 100%;">
    
    <label style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 0.9em;">
      <input type="checkbox" id="checkExplicit"> ⚠️ 18+ (Explicit)
    </label>
    <label style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px; font-size: 0.9em;">
      <input type="checkbox" id="checkAi"> 🤖 AI Generated
    </label>

    <div id="addTrackStatus" style="font-size: 0.9em; color: var(--accent); margin-bottom: 10px; min-height: 20px; font-weight: bold;"></div>

    <div style="display: flex; gap: 10px;">
      <button id="btnSaveTrack" class="primary">Загрузить на GitHub</button>
      <button class="close-modal">Отмена</button>
    </div>
  </div>
</div>

<script>
  const state = {
    allTracks: [],
    playlist: [],
    currentIndex: -1,
    audio: new Audio(),
    isPlaying: false,
    isMyWave: false,
    githubToken: localStorage.getItem('githubToken') || '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',
    gistId: localStorage.getItem('gistId') || '8fd54ada74ef446aca9a82b4aa4aaac4',
    githubRepo: localStorage.getItem('githubRepo') || 'md-dog77/storage_music_LEDMusic',
    speeds: [0.5, 1, 1.25, 1.5, 2],
    currentSpeedIndex: 1
  };

  const defaultCover = 'https://via.placeholder.com/150/1e293b/a855f7?text=Music';
  
  const demoTracks = [
    { id: 1, title: "Демо Трек (Локальный режим)", artist: "Создатель", genre: "Поп", cover: defaultCover, audio: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", explicit: false, ai_generated: true }
  ];

  const els = {
    trackList: document.getElementById('trackList'),
    coverLarge: document.getElementById('coverLarge'),
    currentTitle: document.getElementById('currentTitle'),
    currentArtist: document.getElementById('currentArtist'),
    btnPlay: document.getElementById('btnPlay'),
    btnPrev: document.getElementById('btnPrev'),
    btnNext: document.getElementById('btnNext'),
    btnSpeed: document.getElementById('btnSpeed'),
    progressBar: document.getElementById('progressBar'),
    progressContainer: document.getElementById('progressContainer'),
    currentTime: document.getElementById('currentTime'),
    duration: document.getElementById('duration'),
    volumeControl: document.getElementById('volumeControl'),
    searchInput: document.getElementById('searchInput'),
    btnMyWave: document.getElementById('btnMyWave')
  };

  async function init() {
    setupEventListeners();
    await loadTracks();
  }

  async function loadTracks() {
    if (state.gistId && state.githubToken) {
      try {
        const response = await fetch(`https://api.github.com/gists/${state.gistId}`, {
          headers: { 'Authorization': `Bearer ${state.githubToken}` }
        });
        if (!response.ok) throw new Error('Gist load failed');
        const data = await response.json();
        state.allTracks = JSON.parse(data.files['songs.json'].content);
      } catch (err) {
        console.error('Ошибка загрузки из Gist, включен демо-режим', err);
        loadLocalTracks();
      }
    } else {
      loadLocalTracks();
    }
    state.playlist = [...state.allTracks];
    renderTrackList();
  }

  function loadLocalTracks() {
    const saved = localStorage.getItem('demoTracks');
    state.allTracks = saved ? JSON.parse(saved) : [...demoTracks];
  }

  async function saveTracksToGist() {
    if (state.gistId && state.githubToken) {
      try {
        await fetch(`https://api.github.com/gists/${state.gistId}`, {
          method: 'PATCH',
          headers: {
            'Authorization': `Bearer ${state.githubToken}`,
            'Accept': 'application/vnd.github.v3+json'
          },
          body: JSON.stringify({
            files: { 'songs.json': { content: JSON.stringify(state.allTracks, null, 2) } }
          })
        });
      } catch (err) {
        console.error('Не удалось сохранить JSON в Gist', err);
      }
    } else {
      localStorage.setItem('demoTracks', JSON.stringify(state.allTracks));
    }
  }

  // ФУНКЦИЯ ПРЯМОЙ ЗАГРУЗКИ ФАЙЛА НА GITHUB
  async function uploadFileToGithubRepo(file) {
    const cleanName = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
    
    // Переводим файл в Base64
    const base64Content = await new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.readAsDataURL(file);
    });

    const url = `https://api.github.com/repos/${state.githubRepo}/contents/music/${cleanName}`;
    
    const response = await fetch(url, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${state.githubToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: `Загрузка трека: ${file.name}`,
        content: base64Content
      })
    });

    if (!response.ok) {
      throw new Error('Ошибка при отправке файла в репозиторий. Проверьте имя репо и токен.');
    }

    const data = await response.json();
    // Возвращаем прямую ссылку, которую сгенерировал GitHub
    return data.content.download_url;
  }

  function renderTrackList() {
    els.trackList.innerHTML = '';
    state.playlist.forEach((track, index) => {
      const el = document.createElement('div');
      el.className = `glass-panel track-card ${state.currentIndex === index ? 'active' : ''}`;
      el.innerHTML = `
        <img src="${track.cover || defaultCover}" alt="cover">
        <div class="track-info">
          <div class="track-title">${track.title}</div>
          <div class="track-artist">${track.artist} &bull; ${track.genre}</div>
          <div class="badges">
            ${track.explicit ? '<span class="badge explicit">⚠️ 18+</span>' : ''}
            ${track.ai_generated ? '<span class="badge ai">🤖 AI</span>' : ''}
          </div>
        </div>
      `;
      el.onclick = () => playTrack(index);
      els.trackList.appendChild(el);
    });
  }

  function updatePlayerUI() {
    if (state.currentIndex < 0 || !state.playlist[state.currentIndex]) return;
    const track = state.playlist[state.currentIndex];
    els.currentTitle.textContent = track.title;
    els.currentArtist.textContent = track.artist;
    els.coverLarge.src = track.cover || defaultCover;
    els.btnPlay.textContent = state.isPlaying ? '⏸' : '▶';

    document.querySelectorAll('.track-card').forEach((el, i) => {
      el.classList.toggle('active', i === state.currentIndex);
    });
    updateColorsByGenre(track.genre);
  }

  function updateColorsByGenre(genre) {
    const g = (genre || '').toLowerCase();
    let c1 = '#0f172a', c2 = '#3b0764', accent = '#a855f7';
    if (g.includes('рэп') || g.includes('rap')) { c1 = '#1a202c'; c2 = '#7f1d1d'; accent = '#ef4444'; }
    if (g.includes('поп') || g.includes('pop')) { c1 = '#1e3a8a'; c2 = '#be185d'; accent = '#ec4899'; }
    if (g.includes('ремикс') || g.includes('remix')) { c1 = '#064e3b'; c2 = '#0f766e'; accent = '#14b8a6'; }
    document.documentElement.style.setProperty('--bg-color-1', c1);
    document.documentElement.style.setProperty('--bg-color-2', c2);
    document.documentElement.style.setProperty('--accent', accent);
    els.progressBar.style.background = accent;
  }

  function playTrack(index) {
    if (index < 0 || index >= state.playlist.length) return;
    if (state.currentIndex === index && !state.audio.paused) { pauseAudio(); return; }
    if (state.currentIndex !== index) {
      state.currentIndex = index;
      state.audio.src = state.playlist[index].audio;
      state.audio.playbackRate = state.speeds[state.currentSpeedIndex];
    }
    state.audio.play().then(() => { state.isPlaying = true; updatePlayerUI(); }).catch(e => console.log(e));
  }

  function pauseAudio() { state.audio.pause(); state.isPlaying = false; updatePlayerUI(); }
  function togglePlay() {
    if (state.currentIndex === -1 && state.playlist.length > 0) playTrack(0);
    else if (state.isPlaying) pauseAudio();
    else playTrack(state.currentIndex);
  }

  function setupEventListeners() {
    els.btnPlay.onclick = togglePlay;
    els.btnPrev.onclick = () => playTrack(state.currentIndex > 0 ? state.currentIndex - 1 : state.playlist.length - 1);
    els.btnNext.onclick = () => playTrack(state.currentIndex < state.playlist.length - 1 ? state.currentIndex + 1 : 0);
    
    state.audio.addEventListener('timeupdate', () => {
      const percent = (state.audio.currentTime / state.audio.duration) * 100;
      els.progressBar.style.width = `${percent || 0}%`;
      els.currentTime.textContent = formatTime(state.audio.currentTime);
      els.duration.textContent = formatTime(state.audio.duration || 0);
    });
    state.audio.addEventListener('ended', () => els.btnNext.click());

    els.progressContainer.onclick = (e) => {
      const rect = els.progressContainer.getBoundingClientRect();
      const pos = (e.clientX - rect.left) / rect.width;
      state.audio.currentTime = pos * state.audio.duration;
    };
    els.volumeControl.oninput = (e) => state.audio.volume = e.target.value;

    els.btnSpeed.onclick = () => {
      state.currentSpeedIndex = (state.currentSpeedIndex + 1) % state.speeds.length;
      const speed = state.speeds[state.currentSpeedIndex];
      state.audio.playbackRate = speed;
      els.btnSpeed.textContent = `${speed}x`;
    };

    els.btnMyWave.onclick = () => {
      state.isMyWave = !state.isMyWave;
      els.btnMyWave.classList.toggle('active', state.isMyWave);
      if (state.isMyWave) {
        const waveGenres = ['рэп', 'поп', 'каверы', 'гей-ремиксы', 'ремиксы'];
        state.playlist = state.allTracks.filter(t => waveGenres.some(g => (t.genre || '').toLowerCase().includes(g)));
        state.playlist.sort(() => Math.random() - 0.5);
      } else { state.playlist = [...state.allTracks]; }
      state.currentIndex = -1; renderTrackList(); if(state.playlist.length > 0) playTrack(0);
    };

    els.searchInput.oninput = (e) => {
      const q = e.target.value.toLowerCase();
      state.playlist = state.allTracks.filter(t => t.title.toLowerCase().includes(q) || t.artist.toLowerCase().includes(q) || (t.genre || '').toLowerCase().includes(q));
      renderTrackList();
    };

    document.querySelectorAll('.close-modal').forEach(btn => {
      btn.onclick = (e) => e.target.closest('.modal').classList.remove('show');
    });

    document.getElementById('btnSettings').onclick = () => {
      document.getElementById('inputGistId').value = state.gistId;
      document.getElementById('inputGithubToken').value = state.githubToken;
      document.getElementById('inputGithubRepo').value = state.githubRepo;
      document.getElementById('modalSettings').classList.add('show');
    };

    document.getElementById('btnSaveSettings').onclick = () => {
      state.gistId = document.getElementById('inputGistId').value.trim();
      state.githubToken = document.getElementById('inputGithubToken').value.trim();
      state.githubRepo = document.getElementById('inputGithubRepo').value.trim();
      localStorage.setItem('gistId', state.gistId);
      localStorage.setItem('githubToken', state.githubToken);
      localStorage.setItem('githubRepo', state.githubRepo);
      document.getElementById('modalSettings').classList.remove('show');
      loadTracks();
    };

    document.getElementById('btnAddModal').onclick = () => document.getElementById('modalAddTrack').classList.add('show');

    // КНОПКА ЗАГРУЗКИ ТРЕКА
    document.getElementById('btnSaveTrack').onclick = async () => {
      const fileInput = document.getElementById('inputFile');
      const file = fileInput.files[0];
      const statusEl = document.getElementById('addTrackStatus');

      if (!file) { statusEl.textContent = 'Ошибка: Сначала выберите файл .mp3'; return; }

      const newTrack = {
        id: Date.now(),
        title: file.name.replace(/\.[^/.]+$/, ""), // Название без расширения
        artist: 'Неизвестен',
        genre: 'Unknown',
        cover: defaultCover,
        audio: '',
        explicit: document.getElementById('checkExplicit').checked,
        ai_generated: document.getElementById('checkAi').checked
      };

      statusEl.textContent = '⏳ Шаг 1: Сканирование ID3-тегов...';
      
      try {
        await new Promise((resolve) => {
          jsmediatags.read(file, {
            onSuccess: function(tag) {
              if (tag.tags.title) newTrack.title = tag.tags.title;
              if (tag.tags.artist) newTrack.artist = tag.tags.artist;
              if (tag.tags.genre) newTrack.genre = tag.tags.genre;
              if (tag.tags.picture) {
                const data = tag.tags.picture.data;
                const format = tag.tags.picture.format;
                let base64String = "";
                for (let i = 0; i < data.length; i++) { base64String += String.fromCharCode(data[i]); }
                newTrack.cover = `data:${format};base64,${window.btoa(base64String)}`;
              }
              resolve();
            },
            onError: function() { resolve(); } // Игнорируем ошибку чтения тегов, берем дефолты
          });
        });

        // Проверяем облачный режим
        if (state.githubToken && state.githubRepo) {
          statusEl.textContent = '🚀 Шаг 2: Загрузка файла на GitHub репозиторий...';
          const directAudioUrl = await uploadFileToGithubRepo(file);
          newTrack.audio = directAudioUrl;
        } else {
          // Демо-режим (локально в браузере)
          statusEl.textContent = '💾 Шаг 2: Сохранение локально (Демо)...';
          newTrack.audio = URL.createObjectURL(file); 
        }

        state.allTracks.push(newTrack);
        state.playlist = [...state.allTracks];
        
        statusEl.textContent = '✍️ Шаг 3: Обновление songs.json...';
        await saveTracksToGist();

        renderTrackList();
        statusEl.textContent = '✅ Готово!';
        setTimeout(() => {
          document.getElementById('modalAddTrack').classList.remove('show');
          fileInput.value = '';
          statusEl.textContent = '';
        }, 1000);

      } catch (err) {
        statusEl.textContent = '❌ Ошибка: ' + err.message;
        console.error(err);
      }
    };
  }

  function formatTime(sec) {
    const m = Math.floor(sec / 60) || 0;
    const s = Math.floor(sec % 60) || 0;
    return `${m}:${s < 10 ? '0' : ''}${s}`;
  }

  init();
</script>
</body>
</html>
